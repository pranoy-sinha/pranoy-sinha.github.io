<!DOCTYPE html>
<html>
<head>
  <title>Pranoy Sinha | Certifications</title>

  
  <style>
    body {
      font-family: Arial;
      margin: 40px;
      background: #f9f9f9;
    }

    h1, h3 {
      color: #333;
    }

    .card {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .cert-img {
      width: 200px;
      cursor: pointer;
      border-radius: 6px;
      transition: 0.3s;
    }

    .cert-img:hover {
      transform: scale(1.05);
    }

    /* Lightbox Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      padding-top: 60px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.9);
    }

    .modal-content {
      display: block;
      margin: auto;
      max-width: 80%;
      max-height: 80%;
    }

    .close {
      position: absolute;
      top: 30px;
      right: 40px;
      color: #fff;
      font-size: 35px;
      font-weight: bold;
      cursor: pointer;
    }

  </style>
</head>

<body>

<h1>Pranoy Sinha</h1>
<h3>Certifications & Licenses</h3>

<div class="card">
  <h4>AWS Certified Solutions Architect</h4>
  <p>Issued by AWS | 2024</p>

  <img src="images/aws-cert.jpg" alt="AWS Certificate"
       class="cert-img"
       onclick="openModal(this.src)">

  <br><br>
  <a href="CERTIFICATE_LINK" target="_blank">Verify Certificate</a>
</div>

<div class="card">
  <h4>Google Cloud Professional Architect</h4>
  <p>Issued by Google Cloud | 2023</p>

  <img src="images/gcp-cert.jpg" alt="GCP Certificate"
       class="cert-img"
       onclick="openModal(this.src)">

  <br><br>
  <a href="CERTIFICATE_LINK" target="_blank">Verify Certificate</a>
</div>

<!-- Lightbox Modal -->
<div id="lightboxModal" class="modal">
  <span class="close" onclick="closeModal()">&times;</span>
  <img class="modal-content" id="modalImage">
</div>

<script>
  function openModal(src) {
    document.getElementById("lightboxModal").style.display = "block";
    document.getElementById("modalImage").src = src;
  }

  function closeModal() {
    document.getElementById("lightboxModal").style.display = "none";
  }
</script>

</body>
</html>
